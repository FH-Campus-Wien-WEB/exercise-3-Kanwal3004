<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movies!</title>
    <link rel="stylesheet" href="index.css" />
    <script type="module" src="index.js"></script>

    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #d32828;
            margin: 20px;
        }

        div {
            background-color: white;
            border-radius: 12px;
            margin: 20px 0;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-left: 5px solid #007BFF;
        }

        img {
            max-width: 180px;
            border-radius: 10px;
            display: block;
            margin: 10px 0;
        }

        h2 {
            margin-bottom: 5px;
            font-size: 26px;
            font-weight: bold;
            color: white;
            background-color: #1a73e8;
            padding: 5px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        h3 {
            color: #007BFF;
        }

        ul {
            padding-left: 20px;
        }

        div:hover {
            transform: scale(1.02);
            transition: 0.2s;
            background-color: #fff3cd;
        }

    </style>
  </head>

  <body>
    <!-- Task 1.1. Add the semantic structure -->
    <header>
        <h1>My Movies</h1>
    </header>

    <nav>
        <ul></ul>
    </nav>

    <main></main>

    <footer>
        <ul>
        <li>© 2026</li>
        <li>Web Technologies</li>
        </ul>
    </footer>

  </body>
</html>
